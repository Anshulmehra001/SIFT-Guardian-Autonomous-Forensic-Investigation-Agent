# SIFT Guardian Configuration
# Edit this file to customize behavior

# ============================================
# AI Provider Configuration
# ============================================
ai:
  # Choose provider: "gemini", "groq", "claude", or "ollama"
  provider: "gemini"
  
  # API Key (use environment variable for security)
  # Set via: export GEMINI_API_KEY="your-key"
  # Or edit here (not recommended for production)
  api_key: "AIzaSyAKwy_0sS56B9w5SuO-Yl7Ab11xGBwP6sA"
  
  # Model selection (provider-specific)
  model: "models/gemini-2.5-flash"  # For Gemini (fast, free tier friendly)
  # model: "llama-3.3-70b-versatile"  # For Groq
  # model: "claude-sonnet-4.5"  # For Claude
  # model: "llama3.3:70b"  # For Ollama
  
  # Temperature (0.0 = deterministic, 1.0 = creative)
  temperature: 0.1  # Low for consistent forensic analysis
  
  # Maximum tokens per response
  max_tokens: 4096
  
  # Request timeout (seconds)
  timeout: 60

# ============================================
# Security & Guardrails
# ============================================
security:
  # Evidence protection
  evidence_readonly: true
  require_hash_verification: true
  verify_before_analysis: true
  
  # Command execution
  command_whitelist_enabled: true
  allowed_tools:
    - volatility3
    - volatility
    - vol3
    - regripper
    - fls
    - icat
    - mmls
    - mactime
    - yara
    - strings
    - bulk_extractor
    - foremost
    - grep
    - awk
    - sed
    - jq
    - file
    - stat
    - md5sum
    - sha256sum
  
  # Blocked patterns (command injection prevention)
  blocked_patterns:
    - "rm -rf"
    - "dd if="
    - "mkfs"
    - "fdisk"
    - "shutdown"
    - "reboot"
    - ">"    # Output redirection
    - ">>"   # Append redirection
    - "|"    # Piping (can be dangerous)
    - "&&"   # Command chaining
    - ";"    # Command separator
  
  # Execution limits
  max_execution_time: 300  # 5 minutes per tool
  max_concurrent_tools: 3
  
  # Input validation
  sanitize_inputs: true
  validate_paths: true
  block_path_traversal: true

# ============================================
# Self-Correction Settings
# ============================================
self_correction:
  # Enable autonomous self-correction
  enabled: true
  
  # Confidence threshold (re-check findings below this)
  confidence_threshold: 0.75
  
  # Maximum self-correction iterations
  max_iterations: 3
  
  # Require cross-validation from multiple sources
  cross_validate: true
  min_corroborating_sources: 2
  
  # Contradiction detection
  detect_contradictions: true
  contradiction_threshold: 0.3  # How different findings trigger re-investigation
  
  # Escalation
  escalate_on_low_confidence: true
  escalate_on_conflict: true

# ============================================
# Audit Trail Configuration
# ============================================
audit:
  # Enable comprehensive logging
  enabled: true
  
  # Log directory
  log_directory: "./audit_logs"
  
  # Hash algorithm for integrity
  hash_algorithm: "sha256"
  
  # Immutable logging (prevent tampering)
  immutable: true
  chain_hashing: true
  
  # Log levels
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  
  # Log format
  log_format: "json"  # json or text
  
  # Retention
  max_log_size_mb: 100
  rotate_logs: true

# ============================================
# Forensic Analysis Settings
# ============================================
forensics:
  # Artifact types to analyze
  artifact_types:
    - registry
    - prefetch
    - event_logs
    - mft
    - browser_history
    - lnk_files
    - jumplists
    - recent_files
  
  # Analysis features
  correlation_enabled: true
  timeline_generation: true
  ioc_extraction: true
  
  # Focus areas (MITRE ATT&CK)
  focus_tactics:
    - persistence
    - privilege_escalation
    - defense_evasion
    - credential_access
    - lateral_movement
    - collection
    - exfiltration
  
  # Depth vs breadth
  analysis_depth: "deep"  # Options: quick, standard, deep
  parallel_analysis: true
  
  # Timeframes
  max_timeline_days: 90
  recent_activity_hours: 72

# ============================================
# Reporting Configuration
# ============================================
reporting:
  # Output directory
  output_directory: "./reports"
  
  # Report formats
  formats:
    - markdown
    - json
    - html
  
  # Report sections
  include_executive_summary: true
  include_timeline: true
  include_ioc_list: true
  include_mitre_mapping: true
  include_evidence_chain: true
  include_audit_trail: true
  
  # Detail level
  detail_level: "full"  # Options: summary, standard, full
  
  # Confidence display
  show_confidence_scores: true
  show_self_corrections: true

# ============================================
# Performance Tuning
# ============================================
performance:
  # Caching
  enable_caching: true
  cache_directory: "./.cache"
  cache_ttl_hours: 24
  
  # Parallel processing
  max_workers: 4
  async_io: true
  
  # Memory limits
  max_memory_mb: 4096
  
  # Rate limiting (API calls)
  rate_limit_enabled: true
  max_requests_per_minute: 15  # Gemini free tier limit

# ============================================
# Development & Debug
# ============================================
development:
  # Debug mode
  debug: false
  verbose: false
  
  # Dry run (don't execute tools, simulate only)
  dry_run: false
  
  # Save intermediate results
  save_intermediate: false
  
  # Test mode
  test_mode: false
  mock_tools: false
